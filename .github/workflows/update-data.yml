name: 📊 섹터 데이터 자동 업데이트

on:
  schedule:
    # 미국 동부 시간 오후 4:30 = UTC 21:30 = KST 다음날 06:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-sector-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 의존성 설치
        run: |
          pip install yfinance pytz requests
      
      - name: 🔍 섹터 데이터 수집
        run: |
          python scripts/fetch_data.py
      
      - name: 📤 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/sectors.json
          git diff --staged --quiet || git commit -m "📊 섹터 데이터 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
